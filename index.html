<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlaç ve Rapor Takibi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0; padding: 15px; overflow-x: hidden; color: #333;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .kart {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        label { font-size: 1.3rem; font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="file"], input[type="date"] {
            width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 18px; font-size: 1.4rem; font-weight: bold; color: white;
            background-color: #0056b3; border: none; border-radius: 10px; margin-top: 20px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.98); }
        .paylas-btn { background-color: #17a2b8; }
        .tara-btn { background-color: #fd7e14; margin-top: 5px; }
        .ilac-kutu {
            padding: 15px; border-radius: 10px; margin-bottom: 15px; color: white;
            font-size: 1.3rem; text-align: center; font-weight: bold;
        }
        .yesil { background-color: #28a745; }
        .kirmizi { background-color: #dc3545; }
        .sari { background-color: #ffc107; color: black; }
        .durum-bilgi { font-size: 1rem; margin-top: 5px; background: #e9ecef; color: #333; padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>

<div class="container">
    <h1>Sağlık Asistanım</h1>

    <div class="kart">
        <h2>Rapor Tarayıcı</h2>
        <label>Kamerayı Aç ve Raporu Çek:</label>
        <input type="file" id="raporYukle" accept="image/*" capture="environment">
        <button class="paylas-btn" onclick="tekTuslaPaylas()">Tek Tuşla Paylaş (WhatsApp, Mail...)</button>
    </div>

    <div class="kart">
        <h2>İlaç Ekle</h2>
        <label>İlaç Adı:</label>
        <input type="text" id="ilacAdi" placeholder="Örn: Tansiyon İlacı">

        <label>Kutuda Kaç Adet Var?</label>
        <input type="number" id="ilacAdet" placeholder="Örn: 30">

        <label>Günde Kaç Kere İçilecek?</label>
        <input type="number" id="gunlukDoz" placeholder="Örn: 1">

        <label>Başlangıç Tarihi:</label>
        <input type="date" id="baslangicTarihi">

        <button onclick="ilaciKadetVeSenkronizeEt()">Buluta (GitHub) Kaydet</button>
    </div>

    <div class="kart">
        <h2>İlaç Sayaçlarım</h2>
        <div id="durumBilgisi" class="durum-bilgi">Veriler GitHub'dan bekleniyor...</div>
        <div id="ilacKutulari" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    // ==========================================
    // HAYALET KİLİT MİMARİSİ (GÜVENLİ GITHUB BAĞLANTISI)
    // ==========================================
    
    const sifreliKasa = "U2FsdGVkX18YZOh/CEC1BZdGmmN8qEbU7T9VH7rWp2xupmq48rGl09lbWTleQG3CoVl+dKuwnc2nUinI50/Q2A=="; 
    const gizliPin = "1453"; 
    
    const githubKullaniciAdi = "fthlabz";
    const githubRepoAdi = "rapor-takip";
    const dosyaYolu = "data.json";

    let githubDosyaSha = ""; 
    let ilaclar = [];

    function tokenCoz() {
        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            return bytes.toString(CryptoJS.enc.Utf8);
        } catch(e) {
            console.error("Token çözülemedi. Şifre veya PIN hatalı.");
            return "";
        }
    }

    // Sayfa açıldığında verileri GitHub'dan çek
    window.onload = function() {
        document.getElementById('baslangicTarihi').valueAsDate = new Date();
        githubVerisiniCek();
    };

    // GITHUB'DAN VERİ OKUMA
    async function githubVerisiniCek() {
        const token = tokenCoz();
        if(!token) {
            document.getElementById('durumBilgisi').innerText = "Hayalet Kilit: Token çözülemedi.";
            return;
        }

        const url = `https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`;
        
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const data = await response.json();
                githubDosyaSha = data.sha; 
                
                const decodedStr = decodeURIComponent(escape(atob(data.content)));
                ilaclar = JSON.parse(decodedStr);
                
                document.getElementById('durumBilgisi').innerText = "Veriler GitHub'dan başarıyla yüklendi.";
                listeyiGuncelle();
            } else if (response.status === 404) {
                document.getElementById('durumBilgisi').innerText = "data.json bulunamadı, yeni oluşturulacak.";
                ilaclar = [];
            }
        } catch (error) {
            document.getElementById('durumBilgisi').innerText = "Bağlantı hatası: " + error.message;
        }
    }

    // GITHUB'A VERİ YAZMA
    async function githubVerisiniYaz() {
        const token = tokenCoz();
        const url = `https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`;
        
        const icerikBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(ilaclar, null, 2))));

        const bodyData = {
            message: "İlaç listesi güncellendi",
            content: icerikBase64,
            sha: githubDosyaSha || undefined
        };

        document.getElementById('durumBilgisi').innerText = "GitHub'a kaydediliyor...";

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if (response.ok) {
                const data = await response.json();
                githubDosyaSha = data.content.sha; 
                document.getElementById('durumBilgisi').innerText = "Senkronizasyon Başarılı! (Buluta Kaydedildi)";
            } else {
                document.getElementById('durumBilgisi').innerText = "Kaydetme hatası oluştu.";
            }
        } catch (error) {
            document.getElementById('durumBilgisi').innerText = "Ağ hatası: " + error.message;
        }
    }

    // İLAÇ KAYDET VE SENKRONİZE ET
    function ilaciKadetVeSenkronizeEt() {
        const adi = document.getElementById('ilacAdi').value;
        const adet = parseInt(document.getElementById('ilacAdet').value);
        const doz = parseInt(document.getElementById('gunlukDoz').value);
        const baslangic = document.getElementById('baslangicTarihi').value;

        if(!adi || !adet || !doz || !baslangic) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        const yeniIlac = {
            id: Date.now(),
            adi: adi,
            adet: adet,
            gunlukDoz: doz,
            baslangicTarihi: baslangic
        };

        ilaclar.push(yeniIlac);
        listeyiGuncelle();
        githubVerisiniYaz(); 

        document.getElementById('ilacAdi').value = '';
        document.getElementById('ilacAdet').value = '';
        document.getElementById('gunlukDoz').value = '';
    }

    // LİSTEYİ VE SAYACI GÜNCELLE
    function listeyiGuncelle() {
        const kutuAlani = document.getElementById('ilacKutulari');
        kutuAlani.innerHTML = ''; 

        const bugun = new Date();
        bugun.setHours(0,0,0,0);

        ilaclar.forEach((ilac, index) => {
            const baslangic = new Date(ilac.baslangicTarihi);
            const gecenGun = Math.floor((bugun - baslangic) / (1000 * 60 * 60 * 24));
            
            const kullanilanMiktar = gecenGun * ilac.gunlukDoz;
            let kalanMiktar = ilac.adet - kullanilanMiktar;
            
            if (kalanMiktar < 0) kalanMiktar = 0;

            const kalanGun = Math.floor(kalanMiktar / ilac.gunlukDoz);

            const div = document.createElement('div');
            
            if (kalanMiktar === 0) {
                div.className = 'ilac-kutu kirmizi';
            } else if (kalanGun <= 3) {
                div.className = 'ilac-kutu sari';
            } else {
                div.className = 'ilac-kutu yesil';
            }
            
            let durumMetni = (kalanMiktar === 0) 
                ? "BİTTİ! Raporu Yeniletin/İlacı Alın" 
                : `Kalan: ${kalanMiktar} Adet (${kalanGun} Gün Yeter)`;

            div.innerHTML = `
                ${ilac.adi} <br> 
                <span style="font-size:1.1rem; font-weight:normal;">${durumMetni}</span>
                <br>
                <button onclick="ilacSil(${index})" style="background:#555; padding:8px; font-size:1rem; margin-top:10px; width:auto;">Sil</button>
            `;
            
            kutuAlani.appendChild(div);
        });
    }

    function ilacSil(index) {
        if(confirm("Bu ilacı silmek istediğinize emin misiniz?")) {
            ilaclar.splice(index, 1);
            listeyiGuncelle();
            githubVerisiniYaz(); 
        }
    }

    // TEK TUŞLA PAYLAŞ ÖZELLİĞİ
    async function tekTuslaPaylas() {
        const dosyaGirdisi = document.getElementById('raporYukle');
        
        let paylasimVerisi = {
            title: 'İlaç Raporum ve Listem',
            text: 'Merhaba, bu benim güncel ilaç raporum ve listem. İlgilenir misiniz?'
        };

        if (dosyaGirdisi.files.length > 0) {
            const dosya = dosyaGirdisi.files[0];
            if (navigator.canShare && navigator.canShare({ files: [dosya] })) {
                paylasimVerisi.files = [dosya];
            }
        }

        if (navigator.share) {
            try {
                await navigator.share(paylasimVerisi);
            } catch (err) {
                console.log("Paylaşım iptal edildi veya hata oluştu.", err);
            }
        } else {
            alert("Telefonunuzun tarayıcısı bu paylaşım özelliğini desteklemiyor.");
        }
    }
</script>

</body>
</html>
