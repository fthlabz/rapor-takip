<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İlaç ve Rapor Takibi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern, Karanlık Mod ve Glasy Tasarım Stilleri */
        body {
            font-family: 'Poppins', sans-serif; /* Daha modern bir yazı tipi */
            background-color: #121212; /* Karanlık arka plan */
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        h1, h2 {
            text-align: center;
            color: #ffffff;
            font-weight: 700;
        }

        .container {
            width: 100%;
            max-width: 400px; /* Mobil cihaz odaklı genişlik */
        }

        .kart {
            background-color: rgba(255, 255, 255, 0.05); /* Şeffaf arka plan */
            backdrop-filter: blur(10px); /* Glasomorphic cam efekti */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Hafif kenarlık */
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); /* Yumuşak gölge */
            box-sizing: border-box;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column; /* Label ve input dikeyde hizalanır */
        }

        label {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            background-color: rgba(255, 255, 255, 0.03); /* Şeffaf girdi alanı */
            border: 1px solid rgba(255, 255, 255, 0.15); /* İnce kenarlık */
            border-radius: 12px;
            padding: 15px;
            color: #ffffff;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box; /* Genişliği kenarlık ve dolgu dahil hesaplar, kaymayı önler */
            transition: all 0.3s ease;
        }

        /* Tarih girdi alanı için özel düzeltme, artık kaymıyor */
        input[type="date"] {
            color-scheme: dark; /* Tarih seçicinin karanlık modda görünmesini sağlar */
            text-align: left; /* Sola hizalama */
            width: 100%; /* Tam genişlik */
            display: block; /* Gerekirse blok yapma */
        }

        input:focus {
            outline: none;
            border-color: #00bcd4; /* Odaklandığında vurgu rengi (canlı mavi) */
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-3px); /* Hover efekti */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .paylas-btn {
            background-color: #00bcd4; /* Canlı teal mavisi */
            margin-top: 0;
        }

        .save-btn {
            background-color: #3f51b5; /* Canlı indigo mavisi */
        }

        .delete-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            padding: 10px;
            width: auto;
            margin-top: 15px;
        }

        .ilac-listesi {
            margin-top: 20px;
        }

        .ilac-kutu {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Durum Renkleri (canlı tonlar) */
        .yesil { border-left: 5px solid #4caf50; } /* Canlı yeşil */
        .kirmizi { border-left: 5px solid #f44336; } /* Canlı kırmızı */
        .sari { border-left: 5px solid #ffeb3b; color: #ffffff; } /* Canlı sarı */

        .durum-bilgi {
            font-size: 14px;
            margin-top: 5px;
            background-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sağlık Asistanım</h1>

    <div class="kart glassy">
        <h2>Sadece Paylaş</h2> <div class="input-group">
            <label>Galeriden Rapor Yükle:</label> <input type="file" id="raporYukle" accept="image/*"> </div>
        <button class="paylas-btn" onclick="tekTuslaPaylas()">Sadece Paylaş</button> </div>

    <div class="kart glassy">
        <h2>İlaç Ekle</h2>
        <div class="input-group">
            <label>İlaç Adı:</label>
            <input type="text" id="ilacAdi" placeholder="Örn: Tansiyon İlacı">
        </div>

        <div class="input-group">
            <label>Kutuda Kaç Adet Var?</label>
            <input type="number" id="ilacAdet" placeholder="Örn: 30">
        </div>

        <div class="input-group">
            <label>Günde Kaç Kere İçilecek?</label>
            <input type="number" id="gunlukDoz" placeholder="Örn: 1">
        </div>

        <div class="input-group">
            <label>Başlangıç Tarihi:</label>
            <input type="date" id="baslangicTarihi"> </div>

        <button class="save-btn" onclick="ilaciKadetVeSenkronizeEt()">Kaydet</button> </div>

    <div class="kart glassy">
        <h2>İlaç Sayaçlarım</h2>
        <div id="durumBilgisi" class="durum-bilgi">Veriler GitHub'dan bekleniyor...</div>
        <div id="ilacKutulari" class="ilac-listesi"></div>
    </div>
</div>

<script>
    // ==========================================
    // HAYALET KİLİT MİMARİSİ (GÜVENLİ GITHUB BAĞLANTISI)
    // ==========================================
    
    const sifreliKasa = "U2FsdGVkX18YZOh/CEC1BZdGmmN8qEbU7T9VH7rWp2xupmq48rGl09lbWTleQG3CoVl+dKuwnc2nUinI50/Q2A=="; 
    const gizliPin = "1453"; 
    
    const githubKullaniciAdi = "fthlabz";
    const githubRepoAdi = "rapor-takip";
    const dosyaYolu = "data.json";

    let githubDosyaSha = ""; 
    let ilaclar = [];

    function tokenCoz() {
        try {
            const bytes = CryptoJS.AES.decrypt(sifreliKasa, gizliPin);
            return bytes.toString(CryptoJS.enc.Utf8);
        } catch(e) {
            console.error("Token çözülemedi. Şifre veya PIN hatalı.");
            return "";
        }
    }

    // Sayfa açıldığında verileri GitHub'dan çek
    window.onload = function() {
        // Tarih girdi alanı için bugünün tarihini ayarla
        document.getElementById('baslangicTarihi').valueAsDate = new Date();
        githubVerisiniCek();
    };

    // GITHUB'DAN VERİ OKUMA
    async function githubVerisiniCek() {
        const token = tokenCoz();
        if(!token) {
            document.getElementById('durumBilgisi').innerText = "Hayalet Kilit: Token çözülemedi.";
            return;
        }

        const url = `https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`;
        
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const data = await response.json();
                githubDosyaSha = data.sha; 
                
                const decodedStr = decodeURIComponent(escape(atob(data.content)));
                ilaclar = JSON.parse(decodedStr);
                
                document.getElementById('durumBilgisi').innerText = "Veriler GitHub'dan başarıyla yüklendi.";
                listeyiGuncelle();
            } else if (response.status === 404) {
                document.getElementById('durumBilgisi').innerText = "data.json bulunamadı, yeni oluşturulacak.";
                ilaclar = [];
            }
        } catch (error) {
            document.getElementById('durumBilgisi').innerText = "Bağlantı hatası: " + error.message;
        }
    }

    // GITHUB'A VERİ YAZMA
    async function githubVerisiniYaz() {
        const token = tokenCoz();
        const url = `https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`;
        
        const icerikBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(ilaclar, null, 2))));

        const bodyData = {
            message: "İlaç listesi güncellendi",
            content: icerikBase64,
            sha: githubDosyaSha || undefined
        };

        document.getElementById('durumBilgisi').innerText = "GitHub'a kaydediliyor...";

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if (response.ok) {
                const data = await response.json();
                githubDosyaSha = data.content.sha; 
                document.getElementById('durumBilgisi').innerText = "Senkronizasyon Başarılı! (Buluta Kaydedildi)";
            } else {
                document.getElementById('durumBilgisi').innerText = "Kaydetme hatası oluştu.";
            }
        } catch (error) {
            document.getElementById('durumBilgisi').innerText = "Ağ hatası: " + error.message;
        }
    }

    // İLAÇ KAYDET VE SENKRONİZE ET
    function ilaciKadetVeSenkronizeEt() {
        const adi = document.getElementById('ilacAdi').value;
        const adet = parseInt(document.getElementById('ilacAdet').value);
        const doz = parseInt(document.getElementById('gunlukDoz').value);
        const baslangic = document.getElementById('baslangicTarihi').value;

        if(!adi || !adet || !doz || !baslangic) {
            alert("Lütfen tüm alanları doldurun.");
            return;
        }

        const yeniIlac = {
            id: Date.now(),
            adi: adi,
            adet: adet,
            gunlukDoz: doz,
            baslangicTarihi: baslangic
        };

        ilaclar.push(yeniIlac);
        listeyiGuncelle();
        githubVerisiniYaz(); 

        document.getElementById('ilacAdi').value = '';
        document.getElementById('ilacAdet').value = '';
        document.getElementById('gunlukDoz').value = '';
    }

    // LİSTEYİ VE SAYACI GÜNCELLE
    function listeyiGuncelle() {
        const kutuAlani = document.getElementById('ilacKutulari');
        kutuAlani.innerHTML = ''; 

        const bugun = new Date();
        bugun.setHours(0,0,0,0);

        ilaclar.forEach((ilac, index) => {
            const baslangic = new Date(ilac.baslangicTarihi);
            const gecenGun = Math.floor((bugun - baslangic) / (1000 * 60 * 60 * 24));
            
            const kullanilanMiktar = gecenGun * ilac.gunlukDoz;
            let kalanMiktar = ilac.adet - kullanilanMiktar;
            
            if (kalanMiktar < 0) kalanMiktar = 0;

            const kalanGun = Math.floor(kalanMiktar / ilac.gunlukDoz);

            const div = document.createElement('div');
            
            if (kalanMiktar === 0) {
                div.className = 'ilac-kutu kirmizi';
            } else if (kalanGun <= 3) {
                div.className = 'ilac-kutu sari';
            } else {
                div.className = 'ilac-kutu yesil';
            }
            
            let durumMetni = (kalanMiktar === 0) 
                ? "BİTTİ! Raporu Yeniletin/İlacı Alın" 
                : `Kalan: ${kalanMiktar} Adet (${kalanGun} Gün Yeter)`;

            div.innerHTML = `
                ${ilac.adi} <br> 
                <span style="font-size:14px; font-weight:normal;">${durumMetni}</span>
                <br>
                <button onclick="ilacSil(${index})" class="delete-btn">Sil</button>
            `;
            
            kutuAlani.appendChild(div);
        });
    }

    function ilacSil(index) {
        if(confirm("Bu ilacı silmek istediğinize emin misiniz?")) {
            ilaclar.splice(index, 1);
            listeyiGuncelle();
            githubVerisiniYaz(); 
        }
    }

    // SADECE PAYLAŞ ÖZELLİĞİ
    async function tekTuslaPaylas() {
        const dosyaGirdisi = document.getElementById('raporYukle');
        
        let paylasimVerisi = {
            title: 'İlaç Raporum ve Listem',
            text: 'Merhaba, bu benim güncel ilaç raporum ve listem. İlgilenir misiniz?'
        };

        if (dosyaGirdisi.files.length > 0) {
            const dosya = dosyaGirdisi.files[0];
            if (navigator.canShare && navigator.canShare({ files: [dosya] })) {
                paylasimVerisi.files = [dosya];
            }
        }

        if (navigator.share) {
            try {
                await navigator.share(paylasimVerisi);
            } catch (err) {
                console.log("Paylaşım iptal edildi veya hata oluştu.", err);
            }
        } else {
            alert("Telefonunuzun tarayıcısı bu paylaşım özelliğini desteklemiyor.");
        }
    }
</script>

</body>
</html>
