<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sağlık Yönetimi | Yönetici Girişi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #121212; margin: 0; padding: 20px; overflow-x: hidden; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav-bar { width: 100%; max-width: 450px; display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; text-align: center; padding: 15px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s; color: #fff; }
        .nav-active { background: #00bcd4; color: #121212; }
        .nav-passive { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .container { width: 100%; max-width: 450px; }
        .kart { background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); box-sizing: border-box; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { color: #ffffff; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        input[type="text"], input[type="number"], input[type="file"], input[type="tel"], input[type="password"] { background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 14px; color: #ffffff; font-size: 15px; width: 100%; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #00bcd4; box-shadow: 0 0 10px rgba(0, 188, 212, 0.5); }
        .row { display: flex; gap: 10px; } .row .input-group { flex: 1; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; color: #ffffff; margin-top: 5px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        button:active { transform: scale(0.98); }
        .btn-mavi { background-color: #3f51b5; } .btn-turkuaz { background-color: #00bcd4; }
        
        .btn-kirmizi { background-color: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid rgba(244, 67, 54, 0.3); padding: 10px; font-size: 14px; margin-top: 10px; }
        .btn-guncelle { background-color: rgba(63, 81, 181, 0.1); color: #8c9eff; border: 1px solid rgba(63, 81, 181, 0.3); padding: 10px; font-size: 14px; margin-top: 10px; margin-right: 5px; }
        
        .durum-bilgi { font-size: 13px; margin-bottom: 20px; background-color: rgba(255, 255, 255, 0.05); color: #00bcd4; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(0, 188, 212, 0.3); }
        .yonetim-satir { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); gap: 10px;}
        .yonetim-satir:last-child { border-bottom: none; }
        
        /* PIN Ekranı Stilleri */
        #pinEkrani { display: none; width: 100%; max-width: 350px; margin-top: 15vh; }
        #anaIcerik { display: none; width: 100%; }
        .pin-kutu { text-align: center; border-top: 4px solid #00bcd4; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="nav-btn nav-active"><i class="fas fa-user-shield"></i> Yönetici Paneli</a>
    <a href="takip.html" class="nav-btn nav-passive"><i class="fas fa-chart-line"></i> Hasta Takibi'ne Git</a>
</div>

<div id="pinEkrani">
    <div class="kart pin-kutu">
        <h2 style="margin-top:0;"><i class="fas fa-lock" style="color:#00bcd4; font-size:30px; margin-bottom:10px; display:block;"></i> Yetkili Girişi</h2>
        <p style="color:#aaa; font-size:13px; margin-bottom:20px;">Kayıt ekleme, silme ve tarih yenileme paneline erişmek için PIN kodunuzu giriniz.</p>
        
        <input type="password" id="pinGirdisi" placeholder="PIN Kodu" style="text-align:center; letter-spacing:8px; font-size:20px; font-weight:bold; margin-bottom:15px;" inputmode="numeric" maxlength="4">
        
        <button class="btn-turkuaz" onclick="pinKontrol()"><i class="fas fa-sign-in-alt"></i> Panele Gir</button>
        <div id="pinHata" style="color:#f44336; font-size:13px; margin-top:15px; display:none; font-weight:600;"><i class="fas fa-exclamation-triangle"></i> Hatalı PIN girdiniz!</div>
    </div>
</div>

<div id="anaIcerik">
    <div class="container">
        <div id="durumBilgisi" class="durum-bilgi"><i class="fas fa-circle-notch fa-spin"></i> Sistem başlatılıyor...</div>

        <div class="kart">
            <h2 style="text-align:center; font-size:18px; margin-top:0;"><i class="fas fa-file-medical"></i> Rapor Arşive Ekle</h2>
            <div class="input-group"><label>Hasta Adı Soyadı:</label><input type="text" id="raporHastaAdi" placeholder="Örn: Ahmet Yılmaz"></div>
            <div class="input-group"><label>Rapor Türü / Bölüm:</label><input type="text" id="raporTuru" placeholder="Örn: Kardiyoloji"></div>
            <div class="input-group"><label>Rapor Belgesi:</label><input type="file" id="raporDosya" accept="image/*, application/pdf"></div>
            <button class="btn-turkuaz" onclick="raporKaydet()"><i class="fas fa-upload"></i> Raporu Yükle ve Kaydet</button>
        </div>

        <div class="kart">
            <h2 style="text-align:center; font-size:18px; margin-top:0;"><i class="fas fa-pills"></i> Yeni İlaç Ekle</h2>
            <div class="input-group"><label>Hasta Adı Soyadı:</label><input type="text" id="ilacHastaAdi" placeholder="Örn: Ayşe Yılmaz"></div>
            <div class="input-group"><label>İlaç Adı:</label><input type="text" id="ilacAdi" placeholder="Örn: Tansiyon İlacı"></div>
            <div class="row">
                <div class="input-group"><label>1 Kutudaki Adet:</label><input type="number" id="kutuAdet" placeholder="28/30"></div>
                <div class="input-group"><label>Alınan Kutu Sayısı:</label><input type="number" id="kutuSayisi" placeholder="2" value="1"></div>
            </div>
            <div class="row">
                <div class="input-group"><label>Günde Kaç Tane?</label><input type="number" id="gunlukDoz" placeholder="1"></div>
                <div class="input-group"><label>Başlangıç (GG/AA/YY):</label><input type="tel" id="baslangicTarihi" placeholder="Örn: 01/03/26"></div>
            </div>
            <button class="btn-mavi" onclick="ilacKaydet()"><i class="fas fa-save"></i> İlacı Kaydet</button>
        </div>

        <div class="kart">
            <h2 style="text-align:center; font-size:18px; margin-top:0; color:#f44336;"><i class="fas fa-sliders-h"></i> Veri Yönetimi</h2>
            <h3 style="font-size:15px; color:#00bcd4; border-bottom:1px solid #333; padding-bottom:5px;">Raporlar</h3>
            <div id="silRaporListesi" style="margin-bottom: 20px;"></div>
            <h3 style="font-size:15px; color:#3f51b5; border-bottom:1px solid #333; padding-bottom:5px;">İlaçlar (Tarih Yenile / Sil)</h3>
            <div id="silIlacListesi"></div>
        </div>
    </div>
</div>

<script>
    const sifreliKasa = "U2FsdGVkX18YZOh/CEC1BZdGmmN8qEbU7T9VH7rWp2xupmq48rGl09lbWTleQG3CoVl+dKuwnc2nUinI50/Q2A=="; 
    const gizliPin = "1453"; 
    const githubKullaniciAdi = "fthlabz"; const githubRepoAdi = "rapor-takip"; const dosyaYolu = "data.json";

    let githubDosyaSha = ""; let sistemVerisi = { raporlar: [], ilaclar: [] };

    function tokenCoz() { try { return CryptoJS.AES.decrypt(sifreliKasa, gizliPin).toString(CryptoJS.enc.Utf8); } catch(e) { return ""; } }

    const yoneticiPin = "1453";

    window.onload = function() {
        if(sessionStorage.getItem('yoneticiIzni') === 'onaylandi') {
            sistemiBaslat();
        } else {
            document.getElementById('pinEkrani').style.display = 'block';
        }
    };

    function pinKontrol() {
        const girilenPin = document.getElementById('pinGirdisi').value;
        if(girilenPin === yoneticiPin) {
            sessionStorage.setItem('yoneticiIzni', 'onaylandi');
            document.getElementById('pinEkrani').style.display = 'none';
            sistemiBaslat();
        } else {
            document.getElementById('pinHata').style.display = 'block';
            document.getElementById('pinGirdisi').value = '';
        }
    }

    function sistemiBaslat() {
        document.getElementById('anaIcerik').style.display = 'flex';
        const b = new Date();
        const gun = String(b.getDate()).padStart(2, '0');
        const ay = String(b.getMonth() + 1).padStart(2, '0');
        const yil = String(b.getFullYear()).slice(-2);
        tarihInput.value = `${gun}/${ay}/${yil}`;
        githubVerisiniCek();
    }

    const tarihInput = document.getElementById('baslangicTarihi');
    tarihInput.addEventListener('input', function(e) {
        let deger = e.target.value.replace(/\D/g, ''); 
        if (deger.length > 6) deger = deger.slice(0, 6); 
        let formatli = '';
        if (deger.length > 0) formatli = deger.substring(0, 2);
        if (deger.length > 2) formatli += '/' + deger.substring(2, 4);
        if (deger.length > 4) formatli += '/' + deger.substring(4, 6);
        e.target.value = formatli;
    });

    async function githubVerisiniCek() {
        const token = tokenCoz(); if(!token) return;
        try {
            const r = await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (r.ok) {
                const data = await r.json(); githubDosyaSha = data.sha; 
                const pd = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                if(Array.isArray(pd)) sistemVerisi.ilaclar = pd; else sistemVerisi = pd;
                document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-check-circle'></i> Bağlantı Hazır. İşlem yapabilirsiniz.";
                silmeListeleriniGuncelle();
            } else if (r.status === 404) { document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-info-circle'></i> Veritabanı temiz. İlk kaydınızı yapabilirsiniz."; }
        } catch (e) { document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-exclamation-triangle'></i> Bağlantı hatası."; }
    }

    async function githubVerisiniYaz(mesaj="Sistem güncellendi") {
        const token = tokenCoz();
        document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-sync fa-spin'></i> Buluta kaydediliyor...";
        try {
            const r = await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: mesaj, content: btoa(unescape(encodeURIComponent(JSON.stringify(sistemVerisi)))), sha: githubDosyaSha || undefined })
            });
            if (r.ok) {
                const data = await r.json(); githubDosyaSha = data.content.sha; 
                document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-check-circle'></i> Başarıyla Kaydedildi.";
                silmeListeleriniGuncelle();
            }
        } catch (e) { document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-times-circle'></i> Senkronizasyon hatası."; }
    }

    function resimSikistir(file) {
        return new Promise((resolve) => {
            if (!file.type.match(/image.*/)) { 
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height; const max_size = 2000;
                    if (width > height && width > max_size) { height *= max_size / width; width = max_size; }
                    else if (height > max_size) { width *= max_size / height; height = max_size; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85)); 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function raporKaydet() {
        const ad = document.getElementById('raporHastaAdi').value.trim(); const tur = document.getElementById('raporTuru').value.trim();
        const dosyaG = document.getElementById('raporDosya');
        if(!ad || !tur || dosyaG.files.length === 0) return alert("Lütfen tüm alanları doldurup belge seçin.");
        
        const d = dosyaG.files[0]; 
        document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-spinner fa-spin'></i> Dosya yüksek kalitede hazırlanıyor ve yükleniyor...";
        
        try {
            const base64Veri = await resimSikistir(d);
            const temizBase64 = base64Veri.split(',')[1];
            const uzanti = d.type.includes('image') ? 'jpg' : (d.name.split('.').pop() || 'pdf');
            const yeniDosyaAdi = `raporlar/belge_${Date.now()}_${Math.floor(Math.random()*100)}.${uzanti}`;
            const token = tokenCoz();

            const res = await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${yeniDosyaAdi}`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Rapor dosyası yüklendi", content: temizBase64 })
            });

            if(res.ok) {
                sistemVerisi.raporlar.push({ id: Date.now(), hastaAdi: ad, tur: tur, dosyaAdi: `rapor.${uzanti}`, mimeType: d.type.includes('image') ? 'image/jpeg' : d.type, dosyaYolu: yeniDosyaAdi });
                githubVerisiniYaz("Rapor eklendi");
                document.getElementById('raporHastaAdi').value = ''; document.getElementById('raporTuru').value = ''; document.getElementById('raporDosya').value = '';
            } else { throw new Error("Yükleme reddedildi."); }
        } catch(e) { document.getElementById('durumBilgisi').innerHTML = `<i class='fas fa-times-circle'></i> Hata oluştu. Lütfen tekrar deneyin.`; }
    }

    function ilacKaydet() {
        const hAd = document.getElementById('ilacHastaAdi').value.trim(); const iAd = document.getElementById('ilacAdi').value.trim();
        const kA = parseInt(document.getElementById('kutuAdet').value); const kS = parseInt(document.getElementById('kutuSayisi').value);
        const doz = parseInt(document.getElementById('gunlukDoz').value); 
        
        const tG = document.getElementById('baslangicTarihi').value; 
        if(!hAd || !iAd || !kA || !kS || !doz || tG.length !== 8) return alert("Lütfen tüm form alanlarını eksiksiz girin.");
        
        const parcalar = tG.split('/');
        const gun = parseInt(parcalar[0]);
        const ay = parseInt(parcalar[1]) - 1; 
        const yil = parseInt(parcalar[2]) + 2000; 
        
        const gercekTarih = new Date(yil, ay, gun, 12, 0, 0).toISOString();

        sistemVerisi.ilaclar.push({ id: Date.now(), hastaAdi: hAd, adi: iAd, kutuAdet: kA, kutuSayisi: kS, toplamHap: (kA*kS), gunlukDoz: doz, baslangicTarihi: gercekTarih });
        githubVerisiniYaz("İlaç eklendi");
        document.getElementById('ilacHastaAdi').value = ''; document.getElementById('ilacAdi').value = ''; document.getElementById('kutuAdet').value = ''; document.getElementById('kutuSayisi').value = '1'; document.getElementById('gunlukDoz').value = '';
    }

    // --- YENİ EKLENEN: TARİH GÜNCELLEME SİSTEMİ ---
    function ilacTarihGuncelle(i) {
        const ilac = sistemVerisi.ilaclar[i];
        
        // Önceki başlangıç tarihini GG/AA/YY formatına çevir
        const mevcutTarih = new Date(ilac.baslangicTarihi);
        const g = String(mevcutTarih.getDate()).padStart(2, '0');
        const a = String(mevcutTarih.getMonth() + 1).padStart(2, '0');
        const y = String(mevcutTarih.getFullYear()).slice(-2);
        const eskiFormat = `${g}/${a}/${y}`;

        // Kullanıcıdan yeni tarihi iste
        const yeniTarihGirdisi = prompt(`"${ilac.adi}" ilacını ECZANEDEN YENİ ALDIĞINIZ tarihi giriniz.\n(GG/AA/YY formatında, aralara / koyarak):`, eskiFormat);

        if (yeniTarihGirdisi && yeniTarihGirdisi.length === 8 && yeniTarihGirdisi.includes('/')) {
            const parcalar = yeniTarihGirdisi.split('/');
            if (parcalar.length === 3) {
                const yeniGun = parseInt(parcalar[0]);
                const yeniAy = parseInt(parcalar[1]) - 1;
                const yeniYil = parseInt(parcalar[2]) + 2000;
                
                // İlacın veritabanındaki başlangıç tarihini direkt değiştir
                ilac.baslangicTarihi = new Date(yeniYil, yeniAy, yeniGun, 12, 0, 0).toISOString();
                
                githubVerisiniYaz(`"${ilac.adi}" hak ediş tarihi güncellendi`);
            } else {
                alert("Lütfen tarihi GG/AA/YY şeklinde doğru yazdığınızdan emin olun.");
            }
        } else if(yeniTarihGirdisi !== null) {
            alert("Lütfen tarihi GG/AA/YY şeklinde eksiksiz giriniz.");
        }
    }

    function silmeListeleriniGuncelle() {
        const rList = document.getElementById('silRaporListesi');
        rList.innerHTML = sistemVerisi.raporlar.length === 0 ? '<span style="color:#888; font-size:12px;">Kayıt yok.</span>' : '';
        sistemVerisi.raporlar.forEach((r, i) => {
            rList.innerHTML += `<div class="yonetim-satir">
                <div style="flex:1;"><strong style="color:#fff;">${r.hastaAdi}</strong> <br><span style="font-size:12px; color:#aaa;">${r.tur}</span></div>
                <button class="btn-kirmizi" style="width:auto; margin:0;" onclick="raporSil(${i})"><i class="fas fa-trash"></i></button>
            </div>`;
        });
        
        const iList = document.getElementById('silIlacListesi');
        iList.innerHTML = sistemVerisi.ilaclar.length === 0 ? '<span style="color:#888; font-size:12px;">Kayıt yok.</span>' : '';
        sistemVerisi.ilaclar.forEach((ilac, i) => {
            // İlaç satırına "Tarih Yenile" butonu eklendi
            iList.innerHTML += `<div class="yonetim-satir">
                <div style="flex:1;"><strong style="color:#fff;">${ilac.hastaAdi}</strong> <br><span style="font-size:12px; color:#aaa;">${ilac.adi}</span></div>
                <div style="display:flex;">
                    <button class="btn-guncelle" style="width:auto; margin:0 5px 0 0;" onclick="ilacTarihGuncelle(${i})" title="Yeni Tarih Gir"><i class="fas fa-calendar-day"></i> Tarih Yenile</button>
                    <button class="btn-kirmizi" style="width:auto; margin:0;" onclick="ilacSil(${i})" title="Sil"><i class="fas fa-trash"></i></button>
                </div>
            </div>`;
        });
    }

    function ilacSil(i) { if(confirm("İlacı kalıcı olarak silmek istiyor musunuz?")) { sistemVerisi.ilaclar.splice(i, 1); githubVerisiniYaz("İlaç silindi"); } }
    
    async function raporSil(i) { 
        if(confirm("Raporu kalıcı olarak silmek istiyor musunuz?")) { 
            const r = sistemVerisi.raporlar[i]; const token = tokenCoz();
            try {
                const fileRes = await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${r.dosyaYolu}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if(fileRes.ok) {
                    const fileData = await fileRes.json();
                    await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${r.dosyaYolu}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: "Dosya silindi", sha: fileData.sha }) });
                }
            } catch(e) { console.log("Dosya bulunamadı."); }
            sistemVerisi.raporlar.splice(i, 1); githubVerisiniYaz("Rapor veritabanından silindi"); 
        } 
    }
</script>
</body>
</html>
