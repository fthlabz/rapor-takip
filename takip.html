<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sağlık Yönetimi | Takip</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #121212; margin: 0; padding: 20px; overflow-x: hidden; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav-bar { width: 100%; max-width: 450px; display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; text-align: center; padding: 15px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s; color: #fff; }
        .nav-active { background: #00bcd4; color: #121212; }
        .nav-passive { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .container { width: 100%; max-width: 450px; }
        
        /* Hasta Seçici Kutusu */
        .secici-kutu { background-color: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .secici-kutu label { color: #00bcd4; font-weight: 600; font-size: 14px; }
        select { background-color: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 10px; font-size: 16px; outline: none; font-family: 'Poppins', sans-serif; }
        select option { background-color: #1e1e1e; color: white; }

        .kart { background-color: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); box-sizing: border-box; }
        .liste-kutu { background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; color: #ffffff; font-size: 15px; position: relative; }
        
        .durum-etiketi { font-size: 17px; font-weight: 700; display: block; margin-top: 5px; }
        .yesil { border-left: 5px solid #4caf50; } .kirmizi { border-left: 5px solid #f44336; } .sari { border-left: 5px solid #ffeb3b; }
        .rapor-islem { display: flex; gap: 10px; margin-top: 15px; }
        
        button { cursor: pointer; transition: all 0.3s ease; border-radius: 8px; font-weight: 600; border: none; }
        button:active { transform: scale(0.95); }
        .btn-ikincil { background-color: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 12px; font-size: 14px; flex: 1; }
        .btn-ikincil:hover { background-color: rgba(255, 255, 255, 0.15); }
        
        .durum-bilgi { font-size: 13px; margin-bottom: 20px; background-color: rgba(255, 255, 255, 0.05); color: #00bcd4; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid rgba(0, 188, 212, 0.3); }
        h3 { color: #fff; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 0; display:flex; align-items:center; gap:8px;}
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="nav-btn nav-passive"><i class="fas fa-edit"></i> Kayıt & Silme</a>
    <a href="takip.html" class="nav-btn nav-active"><i class="fas fa-chart-line"></i> Hasta Takibi</a>
</div>

<div class="container">
    <div id="durumBilgisi" class="durum-bilgi"><i class="fas fa-sync fa-spin"></i> Veriler senkronize ediliyor...</div>

    <div class="secici-kutu">
        <label><i class="fas fa-user-injured"></i> Hasta Seçiniz:</label>
        <select id="hastaSecici" onchange="listeleriGuncelle()">
            <option value="">-- Veriler Bekleniyor --</option>
        </select>
    </div>

    <div class="kart" style="border-left: 4px solid #00bcd4;">
        <h3><i class="fas fa-file-medical-alt" style="color:#00bcd4;"></i> Rapor Arşivi</h3>
        <div id="raporListesi"><span style="color:#888; font-size:14px;">Lütfen yukarıdan hasta seçin.</span></div>
    </div>

    <div class="kart" style="border-left: 4px solid #3f51b5;">
        <h3><i class="fas fa-capsules" style="color:#3f51b5;"></i> İlaç Sayaçları</h3>
        <div id="ilacListesi"><span style="color:#888; font-size:14px;">Lütfen yukarıdan hasta seçin.</span></div>
    </div>
</div>

<script>
    const sifreliKasa = "U2FsdGVkX18YZOh/CEC1BZdGmmN8qEbU7T9VH7rWp2xupmq48rGl09lbWTleQG3CoVl+dKuwnc2nUinI50/Q2A=="; 
    const gizliPin = "1453"; 
    const githubKullaniciAdi = "fthlabz"; const githubRepoAdi = "rapor-takip"; const dosyaYolu = "data.json";

    let sistemVerisi = { raporlar: [], ilaclar: [] };

    function tokenCoz() { try { return CryptoJS.AES.decrypt(sifreliKasa, gizliPin).toString(CryptoJS.enc.Utf8); } catch(e) { return ""; } }

    window.onload = function() { githubVerisiniCek(); };

    async function githubVerisiniCek() {
        const token = tokenCoz(); if(!token) return;
        try {
            const r = await fetch(`https://api.github.com/repos/${githubKullaniciAdi}/${githubRepoAdi}/contents/${dosyaYolu}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (r.ok) {
                const data = await r.json(); 
                const pd = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                if(Array.isArray(pd)) sistemVerisi.ilaclar = pd; else sistemVerisi = pd;
                document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-check-circle'></i> Veriler güncel ve yüklendi.";
                hastaSeciciDoldur();
            } else if (r.status === 404) { document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-info-circle'></i> Arşiviniz şu an boş."; }
        } catch (e) { document.getElementById('durumBilgisi').innerHTML = "<i class='fas fa-exclamation-triangle'></i> Bağlantı hatası."; }
    }

    function hastaSeciciDoldur() {
        const secici = document.getElementById('hastaSecici');
        const hastalar = new Set();
        sistemVerisi.raporlar.forEach(r => hastalar.add(r.hastaAdi));
        sistemVerisi.ilaclar.forEach(i => hastalar.add(i.hastaAdi));
        
        secici.innerHTML = '<option value="">-- Bir Hasta Seçin --</option>';
        hastalar.forEach(h => { secici.innerHTML += `<option value="${h}">${h}</option>`; });
        
        listeleriGuncelle();
    }

    function listeleriGuncelle() {
        const seciliHasta = document.getElementById('hastaSecici').value;
        const rL = document.getElementById('raporListesi'); 
        const iL = document.getElementById('ilacListesi'); 
        
        if(!seciliHasta) {
            rL.innerHTML = '<span style="color:#888; font-size:14px;">Lütfen yukarıdan hasta seçin.</span>';
            iL.innerHTML = '<span style="color:#888; font-size:14px;">Lütfen yukarıdan hasta seçin.</span>';
            return;
        }

        const filtrelenmisRaporlar = sistemVerisi.raporlar.filter(r => r.hastaAdi === seciliHasta);
        rL.innerHTML = filtrelenmisRaporlar.length === 0 ? '<div style="font-size:13px; color:#888;">Bu hastaya ait rapor bulunamadı.</div>' : '';
        
        filtrelenmisRaporlar.forEach((r) => {
            // Gerçek index'i bulmak için (eğer ileride lazım olursa diye orijinal index'i obje içinden çekmek gerekir, ancak silme yapmadığımız için direkt objeyi paslayabiliriz)
            const globalIndex = sistemVerisi.raporlar.indexOf(r);
            rL.innerHTML += `
                <div class="liste-kutu" style="border-left: 5px solid #00bcd4;">
                    <div style="font-weight:600; font-size:16px; color:#00bcd4;">${r.tur} Raporu</div>
                    <div class="rapor-islem">
                        <button class="btn-ikincil" onclick="raporGoruntule(${globalIndex})"><i class="fas fa-eye"></i> Görüntüle</button>
                        <button class="btn-ikincil" onclick="raporPaylas(${globalIndex})"><i class="fas fa-share-alt"></i> Paylaş</button>
                    </div>
                </div>`;
        });

        const filtrelenmisIlaclar = sistemVerisi.ilaclar.filter(ilac => ilac.hastaAdi === seciliHasta);
        iL.innerHTML = filtrelenmisIlaclar.length === 0 ? '<div style="font-size:13px; color:#888;">Bu hastaya ait ilaç bulunamadı.</div>' : '';
        
        const bugun = new Date(); bugun.setHours(12,0,0,0);
        
        filtrelenmisIlaclar.forEach((ilac) => {
            const baslangic = new Date(ilac.baslangicTarihi); baslangic.setHours(12,0,0,0);
            let gecenGun = Math.round((bugun - baslangic) / (1000 * 60 * 60 * 24)); if(gecenGun < 0) gecenGun = 0;
            let kalanHap = ilac.toplamHap - (gecenGun * ilac.gunlukDoz); if (kalanHap < 0) kalanHap = 0;
            const kalanGun = Math.floor(kalanHap / ilac.gunlukDoz);
            
            const renk = kalanHap === 0 ? 'kirmizi' : (kalanGun <= 3 ? 'sari' : 'yesil');
            const dMetni = kalanHap === 0 ? "<span style='color:#ff5252;'><i class='fas fa-exclamation-circle'></i> BİTTİ! Yenilenmeli</span>" : `<span style='color:#4caf50;'><i class='fas fa-check-circle'></i> ${kalanGun} Gün Kaldı</span>`;
            
            iL.innerHTML += `
                <div class="liste-kutu ${renk}">
                    <div style="font-weight:600; font-size:18px;">${ilac.adi}</div>
                    <div style="font-size:13px; color:#bbb; margin-top:5px;"><i class="fas fa-box"></i> Toplam: ${ilac.kutuSayisi} Kutu (${ilac.toplamHap} Hap)</div>
                    <div class="durum-etiketi">${dMetni}</div>
                </div>`;
        });
    }

    function raporGoruntule(globalIndex) {
        const r = sistemVerisi.raporlar[globalIndex]; const p = window.open("");
        if(r.mimeType.includes("image")) p.document.write(`<img src="${r.veri}" style="width:100%; height:auto;">`);
        else if (r.mimeType.includes("pdf")) p.document.write(`<iframe src="${r.veri}" style="width:100%; height:100vh; border:none;"></iframe>`);
    }

    async function raporPaylas(globalIndex) {
        const r = sistemVerisi.raporlar[globalIndex];
        try {
            const res = await fetch(r.veri); const blob = await res.blob();
            const dosya = new File([blob], r.dosyaAdi, { type: r.mimeType });
            if (navigator.canShare && navigator.canShare({ files: [dosya] })) {
                await navigator.share({ title: `${r.hastaAdi} Raporu`, text: `Belge Ektedir.`, files: [dosya] });
            } else alert("Cihazınız doğrudan dosya paylaşımını desteklemiyor.");
        } catch(e) { alert("Paylaşım sırasında hata oluştu."); }
    }
</script>
</body>
</html>
